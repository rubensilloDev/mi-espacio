<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mi Espacio</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f8f6f1;min-height:100vh}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#d6d3d1;border-radius:2px}
input,textarea,select,button{font-family:inherit}
.icard{transition:box-shadow .18s,transform .18s;cursor:pointer}
.icard:hover{box-shadow:0 6px 20px rgba(0,0,0,.09)!important;transform:translateY(-1px)}
.slink{width:100%;display:flex;align-items:center;gap:9px;padding:9px 16px;background:transparent;border:none;color:#a8a29e;font-size:13px;font-weight:400;transition:all .15s;text-align:left;cursor:pointer}
.slink:hover{background:rgba(245,158,11,.13)!important}
.slink.active{background:rgba(245,158,11,.15)!important;color:#f59e0b!important;font-weight:600}
.fab{position:fixed;bottom:22px;right:22px;width:54px;height:54px;border-radius:50%;background:#f59e0b;border:none;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(245,158,11,.4);z-index:30;cursor:pointer;transition:transform .15s}
.fab:active{transform:scale(.94)}
.btn-primary{background:#f59e0b;color:#fff;border:none;border-radius:9px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px}
.btn-gray{background:#f5f5f4;border:none;border-radius:9px;padding:8px 14px;font-size:13px;color:#78716c;cursor:pointer}
@keyframes su{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fi{from{opacity:0}to{opacity:1}}
.mbox{animation:su .2s ease}
.movl{animation:fi .18s ease}
.cal-d:hover{background:#fef3c7!important;cursor:pointer}
.status-draft{background:#94a3b822;color:#94a3b8}
.status-scheduled{background:#f59e0b22;color:#f59e0b}
.status-published{background:#22c55e22;color:#22c55e}
#app{display:flex;min-height:100vh}
#sidebar{position:fixed;top:0;left:0;width:256px;height:100vh;background:#1c1917;display:flex;flex-direction:column;z-index:50;transition:left .25s ease}
#main{flex:1;display:flex;flex-direction:column;min-width:0;margin-left:256px}
#backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:40}
@media(max-width:700px){#sidebar{left:-260px}#sidebar.open{left:0}#main{margin-left:0}#backdrop.show{display:block}}
</style>
</head>
<body>
<div id="app">
  <!-- LOGIN -->
  <div id="login-screen" style="display:none;width:100%;min-height:100vh;background:#1c1917;align-items:center;justify-content:center;padding:24px">
    <div style="background:#292524;border-radius:20px;padding:36px;max-width:340px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.5)">
      <div style="width:56px;height:56px;background:#f59e0b;border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#1c1917" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      </div>
      <h1 style="color:#fafaf8;font-size:22px;font-weight:800;margin-bottom:8px">mi espacio</h1>
      <p style="color:#78716c;font-size:14px;line-height:1.6;margin-bottom:28px">Tu app personal de notas, listas y calendario.<br>Inicia sesión para sincronizar en todos tus dispositivos.</p>
      <button id="btn-google" style="width:100%;padding:13px 16px;background:#fff;border:none;border-radius:12px;font-size:15px;font-weight:600;color:#1c1917;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continuar con Google
      </button>
      <div id="login-error" style="color:#f87171;font-size:12px;margin-top:12px;display:none"></div>
      <p style="color:#44403c;font-size:11px;margin-top:20px;line-height:1.5">Tus datos se guardan de forma segura<br>y solo tú puedes verlos.</p>
    </div>
  </div>

  <!-- APP -->
  <div id="main-app" style="display:none;width:100%">
    <div id="backdrop"></div>

    <!-- SIDEBAR -->
    <div id="sidebar">
      <div style="padding:16px 16px 12px;border-bottom:1px solid rgba(255,255,255,.07)">
        <div style="display:flex;align-items:center;gap:9px;margin-bottom:12px">
          <div style="width:30px;height:30px;background:#f59e0b;border-radius:8px;display:flex;align-items:center;justify-content:center">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#1c1917" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
          </div>
          <span style="color:#fafaf8;font-weight:700;font-size:15px">mi espacio</span>
        </div>
        <div id="user-info" style="display:flex;align-items:center;gap:9px;padding:9px 10px;background:rgba(255,255,255,.06);border-radius:10px">
          <img id="user-avatar" src="" alt="" style="width:28px;height:28px;border-radius:50%;display:none"/>
          <div id="user-avatar-placeholder" style="width:28px;height:28px;border-radius:50%;background:#f59e0b;display:flex;align-items:center;justify-content:center;flex-shrink:0">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1c1917" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </div>
          <div style="flex:1;min-width:0">
            <div id="user-name" style="color:#fafaf8;font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></div>
            <div id="user-email" style="color:#57534e;font-size:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></div>
          </div>
          <button id="btn-logout" title="Cerrar sesión" style="background:none;border:none;color:#57534e;cursor:pointer;padding:3px;flex-shrink:0">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#57534e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          </button>
        </div>
      </div>
      <nav style="flex:1;overflow-y:auto;padding:10px 0">
        <button class="slink active" data-view="home" id="nav-home">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Inicio
        </button>
        <button class="slink" data-view="calendar" id="nav-calendar">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          Calendario
        </button>
        <button class="slink" data-view="search" id="nav-search">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          Buscar
        </button>
        <div style="padding:14px 16px 6px;display:flex;align-items:center;justify-content:space-between">
          <span style="color:#57534e;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase">Carpetas</span>
          <button id="btn-new-folder" style="background:none;border:none;color:#57534e;cursor:pointer;display:flex;padding:2px">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#57534e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
          </button>
        </div>
        <div id="folder-list"></div>
      </nav>
      <div style="padding:10px 16px;border-top:1px solid rgba(255,255,255,.06)">
        <div style="display:flex;align-items:center;gap:6px;color:#44403c;font-size:10px">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#44403c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/></svg>
          Sincronizado en la nube
        </div>
      </div>
    </div>

    <!-- MAIN CONTENT -->
    <div id="main">
      <!-- Header -->
      <div id="header" style="background:#f8f6f1;border-bottom:1px solid #e8e4de;padding:13px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:20">
        <button id="btn-menu" style="background:none;border:none;color:#78716c;cursor:pointer;display:none;padding:4px">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <button id="btn-back" style="background:none;border:none;color:#78716c;cursor:pointer;display:none;padding:4px">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        </button>
        <div id="header-title" style="flex:1;display:flex;align-items:center;gap:8px">
          <span style="font-weight:700;font-size:17px;color:#1c1917">Inicio</span>
        </div>
        <div id="search-bar" style="flex:1;position:relative;display:none">
          <div style="position:absolute;left:10px;top:50%;transform:translateY(-50%);pointer-events:none">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#a8a29e" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </div>
          <input id="search-input" placeholder="Buscar notas, listas, archivos…" style="width:100%;padding:9px 10px 9px 32px;background:#ede9e3;border:none;border-radius:10px;font-size:14px;color:#1c1917;outline:none"/>
        </div>
        <button id="btn-search-toggle" style="background:none;border:none;color:#78716c;cursor:pointer;padding:4px">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </button>
      </div>

      <!-- Content -->
      <div id="content" style="flex:1;overflow-y:auto;padding-bottom:80px"></div>
    </div>

    <!-- FAB -->
    <button class="fab" id="fab">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
  </div>
</div>

<!-- ITEM MODAL -->
<div id="item-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:60;align-items:flex-end" class="movl">
  <div class="mbox" style="background:#fff;border-radius:18px 18px 0 0;width:100%;max-height:94vh;overflow-y:auto;padding:18px 16px 40px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <span id="modal-title" style="font-weight:700;font-size:16px;color:#1c1917">Nueva nota</span>
      <div style="display:flex;gap:7px">
        <button id="btn-save-item" class="btn-primary">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          Guardar
        </button>
        <button id="btn-close-item" class="btn-gray" style="padding:8px">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#78716c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
    </div>
    <!-- Type selector -->
    <div style="display:flex;gap:5px;margin-bottom:12px" id="type-selector">
      <button class="type-btn active" data-type="note" style="flex:1;padding:7px 4px;border-radius:9px;border:1.5px solid #1c1917;font-size:11px;font-weight:600;background:#1c1917;color:#fff;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Nota
      </button>
      <button class="type-btn" data-type="list" style="flex:1;padding:7px 4px;border-radius:9px;border:1.5px solid #e7e5e4;font-size:11px;font-weight:600;background:transparent;color:#78716c;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>Lista
      </button>
      <button class="type-btn" data-type="file" style="flex:1;padding:7px 4px;border-radius:9px;border:1.5px solid #e7e5e4;font-size:11px;font-weight:600;background:transparent;color:#78716c;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16c0 1.1.9 2 2 2h12a2 2 0 0 0 2-2V8l-6-6z"/><polyline points="14 2 14 8 20 8"/></svg>Texto
      </button>
    </div>
    <input id="item-title-input" placeholder="Título…" style="width:100%;font-size:17px;font-weight:700;color:#1c1917;border:none;outline:none;border-bottom:2px solid #f0ede9;padding:3px 0 9px;margin-bottom:12px;background:transparent"/>
    <!-- Note editor -->
    <div id="note-editor">
      <div style="display:flex;gap:5px;margin-bottom:7px">
        <button id="btn-edit-mode" style="font-size:11px;padding:4px 10px;border-radius:6px;border:1px solid #1c1917;background:#1c1917;color:#fff;cursor:pointer">✏️ Editar</button>
        <button id="btn-preview-mode" style="font-size:11px;padding:4px 10px;border-radius:6px;border:1px solid #e7e5e4;background:transparent;color:#78716c;cursor:pointer">👁 Preview</button>
      </div>
      <textarea id="note-content" placeholder="## Título&#10;&#10;- Lista&#10;**negrita**" rows="7" style="width:100%;border:1px solid #e7e5e4;border-radius:9px;padding:11px;font-size:13px;line-height:1.6;color:#292524;resize:vertical;outline:none;background:#fafaf8;font-family:monospace"></textarea>
      <div id="note-preview" style="display:none;padding:12px;background:#fafaf8;border-radius:9px;border:1px solid #e7e5e4;min-height:100px;font-size:14px;line-height:1.7;color:#292524"></div>
    </div>
    <!-- File editor -->
    <div id="file-editor" style="display:none">
      <textarea id="file-content" placeholder="Texto libre, apuntes, código…" rows="7" style="width:100%;border:1px solid #e7e5e4;border-radius:9px;padding:11px;font-size:13px;line-height:1.6;color:#292524;resize:vertical;outline:none;background:#fafaf8;font-family:monospace"></textarea>
    </div>
    <!-- List editor -->
    <div id="list-editor" style="display:none">
      <div id="list-items-container"></div>
      <div style="display:flex;gap:7px;margin-top:9px">
        <input id="li-input" placeholder="Nueva tarea… (Enter)" style="flex:1;padding:9px 11px;border:1px solid #e7e5e4;border-radius:9px;font-size:13px;outline:none"/>
        <button id="btn-add-li" style="background:#f59e0b;border:none;border-radius:9px;padding:9px 13px;cursor:pointer;display:flex;align-items:center">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      </div>
    </div>
    <!-- Meta -->
    <div style="margin-top:14px;padding:13px;background:#fafaf8;border-radius:11px;border:1px solid #f0ede9">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
        <div>
          <label style="font-size:9px;font-weight:700;color:#a8a29e;text-transform:uppercase;letter-spacing:.8px;display:block;margin-bottom:4px">Estado</label>
          <select id="item-status" style="width:100%;padding:8px 9px;border:1px solid #e7e5e4;border-radius:8px;font-size:12px;background:#fff;font-weight:600;outline:none">
            <option value="draft">Borrador</option>
            <option value="scheduled">Programado</option>
            <option value="published">Publicado</option>
          </select>
        </div>
        <div>
          <label style="font-size:9px;font-weight:700;color:#a8a29e;text-transform:uppercase;letter-spacing:.8px;display:block;margin-bottom:4px">Carpeta</label>
          <select id="item-folder" style="width:100%;padding:8px 9px;border:1px solid #e7e5e4;border-radius:8px;font-size:12px;background:#fff;outline:none">
            <option value="">Sin carpeta</option>
          </select>
        </div>
      </div>
      <div style="margin-bottom:10px">
        <label style="font-size:9px;font-weight:700;color:#a8a29e;text-transform:uppercase;letter-spacing:.8px;display:block;margin-bottom:4px">📅 Fecha y hora programada</label>
        <input type="datetime-local" id="item-scheduled" style="width:100%;padding:8px 9px;border:1px solid #e7e5e4;border-radius:8px;font-size:12px;background:#fff;outline:none"/>
      </div>
      <div>
        <label style="font-size:9px;font-weight:700;color:#a8a29e;text-transform:uppercase;letter-spacing:.8px;display:block;margin-bottom:6px">Color</label>
        <div id="color-picker" style="display:flex;gap:6px;flex-wrap:wrap"></div>
      </div>
    </div>
  </div>
</div>

<!-- FOLDER MODAL -->
<div id="folder-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:60;align-items:center;justify-content:center;padding:20px" class="movl">
  <div class="mbox" style="background:#fff;border-radius:14px;width:100%;max-width:380px;padding:22px">
    <h3 id="folder-modal-title" style="font-weight:700;font-size:16px;margin-bottom:14px;color:#1c1917">Nueva carpeta</h3>
    <input id="folder-title-input" placeholder="Nombre de la carpeta" style="width:100%;padding:10px 11px;border:1px solid #e7e5e4;border-radius:9px;font-size:14px;margin-bottom:9px;outline:none"/>
    <textarea id="folder-desc-input" placeholder="Descripción (opcional)" rows="2" style="width:100%;padding:9px 11px;border:1px solid #e7e5e4;border-radius:9px;font-size:13px;margin-bottom:11px;resize:none;outline:none"></textarea>
    <div style="margin-bottom:14px">

      <button id="btn-close-folder" style="padding:11px 15px;background:#f5f5f4;border:none;border-radius:9px;font-size:14px;color:#78716c;cursor:pointer">Cancelar</button>

<div id="confirm-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:70;align-items:center;justify-content:center;padding:20px">
  <div class="mbox" style="background:#fff;border-radius:16px;padding:24px;max-width:320px;width:100%">
    <p id="confirm-msg" style="font-size:15px;color:#1c1917;margin-bottom:20px;line-height:1.5"></p>
    <div style="display:flex;gap:8px">
      <button id="btn-confirm-ok" style="flex:1;background:#ef4444;color:#fff;border:none;border-radius:10px;padding:11px;font-size:14px;font-weight:600;cursor:pointer">Eliminar</button>
      <button id="btn-confirm-cancel" style="flex:1;background:#f5f5f4;border:none;border-radius:10px;padding:11px;font-size:14px;color:#78716c;cursor:pointer">Cancelar</button>
    </div>

<script>
const COLORS = ["#f59e0b","#3b82f6","#10b981","#8b5cf6","#ef4444","#ec4899","#06b6d4","#84cc16"];
const STATUS_COLORS = {draft:"#94a3b8",scheduled:"#f59e0b",published:"#22c55e"};
const STATUS_LABELS = {draft:"Borrador",scheduled:"Programado",published:"Publicado"};
const MONTHS = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const DAYS = ["D","L","M","X","J","V","S"];

const uid = () => Math.random().toString(36).slice(2,10);
const fmtDate = d => d ? new Date(d).toLocaleDateString("es-ES",{day:"2-digit",month:"short"}) : "";
const fmtTime = d => d ? new Date(d).toLocaleTimeString("es-ES",{hour:"2-digit",minute:"2-digit"}) : "";
const fmtFull = d => d ? `${fmtDate(d)} ${fmtTime(d)}` : "";

// ── Firebase init
const firebaseConfig = {
  apiKey:"AIzaSyBExWvzvv8IA17ZtMQei9cZ3SH4Xnb5_h8",
  authDomain:"app-ideas-4d77b.firebaseapp.com",
  projectId:"app-ideas-4d77b",
  storageBucket:"app-ideas-4d77b.firebasestorage.app",
  messagingSenderId:"631636683224",
  appId:"1:631636683224:web:9c021ae78629e701c5eaad"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const provider = new firebase.auth.GoogleAuthProvider();

// ── State
let currentUser = null;
let folders = [];
let items = [];
let currentView = "home";
let activeFolderId = null;
let editingItem = null;
let editingFolder = null;
let currentItemColor = "#f59e0b";
let currentFolderColor = "#f59e0b";
let currentListItems = [];
let confirmCallback = null;
let calYear, calMonth;
const now = new Date();
calYear = now.getFullYear();
calMonth = now.getMonth();

// ── Auth
auth.onAuthStateChanged(user => {
  if (user) {
    currentUser = user;
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("main-app").style.display = "flex";
    setupUser(user);
    listenData();
    checkMobile();
  } else {
    currentUser = null;
    document.getElementById("login-screen").style.display = "flex";
    document.getElementById("main-app").style.display = "none";
  }
});

document.getElementById("btn-google").onclick = async () => {
  try {
    await auth.signInWithPopup(provider);
  } catch(e) {
    const err = document.getElementById("login-error");
    err.style.display = "block";
    err.textContent = "Error al iniciar sesión. Inténtalo de nuevo.";
  }
};
document.getElementById("btn-logout").onclick = () => auth.signOut();

function setupUser(user) {
  document.getElementById("user-name").textContent = user.displayName?.split(" ")[0] || "Usuario";
  document.getElementById("user-email").textContent = user.email;
  if (user.photoURL) {
    document.getElementById("user-avatar").src = user.photoURL;
    document.getElementById("user-avatar").style.display = "block";
    document.getElementById("user-avatar-placeholder").style.display = "none";
  }
}

// ── Firestore listeners
function listenData() {
  const uid2 = currentUser.uid;
  db.collection("users").doc(uid2).collection("folders").orderBy("created_at","asc").onSnapshot(snap => {
    folders = snap.docs.map(d => ({id:d.id,...d.data()}));
    renderFolderList();
    if (currentView === "folder") renderContent();
  });
  db.collection("users").doc(uid2).collection("items").orderBy("updated_at","desc").onSnapshot(snap => {
    items = snap.docs.map(d => ({id:d.id,...d.data()}));
    renderContent();
  });
}

// ── Navigation
function setView(view, folderId) {
  currentView = view;
  activeFolderId = folderId || null;
  document.querySelectorAll(".slink[data-view]").forEach(b => b.classList.remove("active"));
  const navBtn = document.getElementById("nav-"+view);
  if (navBtn) navBtn.classList.add("active");
  document.querySelectorAll(".folder-nav-btn").forEach(b => {
    b.classList.toggle("active", b.dataset.fid === folderId);
  });
  // Header
  const backBtn = document.getElementById("btn-back");
  const titleEl = document.getElementById("header-title");
  const searchBar = document.getElementById("search-bar");
  const searchToggle = document.getElementById("btn-search-toggle");
  backBtn.style.display = view === "folder" ? "flex" : "none";
  searchBar.style.display = view === "search" ? "flex" : "none";
  searchToggle.style.display = view === "search" ? "none" : "flex";
  titleEl.style.display = view === "search" ? "none" : "flex";
  if (view === "folder") {
    const f = folders.find(x => x.id === folderId);
    titleEl.innerHTML = `<div style="width:9px;height:9px;border-radius:50%;background:${f?.color||'#ccc'}"></div><span style="font-weight:700;font-size:17px;color:#1c1917;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${f?.title||""}</span>`;
  } else if (view !== "search") {
    const labels = {home:"Inicio",calendar:"Calendario"};
    titleEl.innerHTML = `<span style="font-weight:700;font-size:17px;color:#1c1917">${labels[view]||""}</span>`;
  }
  // FAB
  document.getElementById("fab").style.display = "flex";
  if (view === "search") document.getElementById("fab").style.display = "none";
  // Close sidebar on mobile
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("backdrop").classList.remove("show");
  renderContent();
}

document.getElementById("btn-back").onclick = () => setView("home");
document.getElementById("btn-menu").onclick = () => {
  document.getElementById("sidebar").classList.toggle("open");
  document.getElementById("backdrop").classList.toggle("show");
};
document.getElementById("backdrop").onclick = () => {
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("backdrop").classList.remove("show");
};
document.querySelectorAll(".slink[data-view]").forEach(b => {
  b.onclick = () => setView(b.dataset.view);
});
document.getElementById("btn-search-toggle").onclick = () => setView("search");

// Search
document.getElementById("search-input").oninput = e => renderContent();

function checkMobile() {
  const isMobile = window.innerWidth <= 700;
  document.getElementById("btn-menu").style.display = isMobile ? "flex" : "none";
}
window.addEventListener("resize", checkMobile);

// ── Render content
function renderContent() {
  const el = document.getElementById("content");
  if (currentView === "home") el.innerHTML = renderHome();
  else if (currentView === "folder") el.innerHTML = renderFolder();
  else if (currentView === "calendar") el.innerHTML = renderCalendar();
  else if (currentView === "search") el.innerHTML = renderSearch();
  attachCardEvents();
  if (currentView === "calendar") attachCalEvents();
}

// ── HOME
function renderHome() {
  const scheduled = [...items].filter(i=>i.status==="scheduled"&&i.scheduled_at).sort((a,b)=>new Date(a.scheduled_at)-new Date(b.scheduled_at)).slice(0,4);
  const recent = items.slice(0,15);
  let html = '<div style="padding:16px">';
  if (scheduled.length > 0) {
    html += secTitle("🔔","Próximas programaciones");
    scheduled.forEach(i => html += itemCard(i, folders.find(f=>f.id===i.folder_id)));
  }
  html += secTitle("⭐","Recientes");
  if (recent.length === 0) html += emptyState("Toca + para crear tu primera nota");
  else recent.forEach(i => html += itemCard(i, folders.find(f=>f.id===i.folder_id)));
  html += "</div>";
  return html;
}

// ── FOLDER VIEW
function renderFolder() {
  const folder = folders.find(f=>f.id===activeFolderId);
  const its = items.filter(i=>i.folder_id===activeFolderId);
  let html = '<div style="padding:16px">';
  if (folder?.description) html += `<p style="font-size:13px;color:#78716c;margin-bottom:14px;padding:10px 13px;background:#fff;border-radius:10px;border:1px solid #ede9e3">${folder.description}</p>`;
  // Filter buttons
  html += '<div id="folder-filters" style="display:flex;gap:5px;margin-bottom:14px;flex-wrap:wrap">';
  ["all","draft","scheduled","published"].forEach(s => {
    const active = (document.querySelector("[data-filter].active-filter") || {dataset:{filter:"all"}}).dataset.filter === s;
    html += `<button class="filter-btn" data-filter="${s}" style="padding:5px 12px;border-radius:20px;border:1.5px solid;font-size:11px;font-weight:600;cursor:pointer;background:transparent;color:${s==="all"?"#57534e":STATUS_COLORS[s]};border-color:${s==="all"?"#d6d3d1":STATUS_COLORS[s]}">${s==="all"?"Todos":STATUS_LABELS[s]}</button>`;
  });
  html += "</div>";
  if (its.length === 0) html += emptyState("Sin items en esta carpeta");
  else its.forEach(i => html += itemCard(i, null));
  html += "</div>";
  return html;
}

// ── CALENDAR
function renderCalendar() {
  const scheduled = items.filter(i=>i.scheduled_at);
  const byDate = {};
  scheduled.forEach(i => {
    const d = new Date(i.scheduled_at);
    const k = `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
    if (!byDate[k]) byDate[k] = [];
    byDate[k].push(i);
  });
  const dim = new Date(calYear,calMonth+1,0).getDate();
  const fd = new Date(calYear,calMonth,1).getDay();
  const isToday = d => d===now.getDate()&&calMonth===now.getMonth()&&calYear===now.getFullYear();
  let html = `<div style="padding:16px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <button id="cal-prev" style="background:none;border:none;color:#78716c;cursor:pointer;padding:6px">&#8249;</button>
      <span style="font-weight:700;font-size:17px;color:#1c1917">${MONTHS[calMonth]} ${calYear}</span>
      <button id="cal-next" style="background:none;border:none;color:#78716c;cursor:pointer;padding:6px">&#8250;</button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:1px;margin-bottom:3px">`;
  DAYS.forEach(d => html += `<div style="text-align:center;font-size:9px;font-weight:700;color:#a8a29e;padding:3px 0">${d}</div>`);
  html += `</div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px">`;
  for(let i=0;i<fd;i++) html += "<div></div>";
  for(let d=1;d<=dim;d++){
    const k=`${calYear}-${calMonth}-${d}`;
    const di=byDate[k]||[];
    const todayCls=isToday(d)?"background:#fef3c7;border:1.5px solid #f59e0b;":"background:#fff;border:1px solid #ede9e3;";
    const iso=`${calYear}-${String(calMonth+1).padStart(2,"0")}-${String(d).padStart(2,"0")}T09:00`;
    html += `<div class="cal-d" data-iso="${iso}" style="min-height:54px;${todayCls}border-radius:7px;padding:4px;transition:background .15s">
      <div style="font-size:11px;font-weight:${isToday(d)?700:400};color:${isToday(d)?"#f59e0b":"#1c1917"};margin-bottom:2px">${d}</div>`;
    di.slice(0,2).forEach(i => {
      html += `<div class="cal-item" data-iid="${i.id}" style="font-size:8px;padding:1px 3px;border-radius:3px;background:${(i.color||"#94a3b8")}25;color:${i.color||"#57534e"};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:1px;font-weight:600;cursor:pointer">${i.title}</div>`;
    });
    if(di.length>2) html+=`<div style="font-size:8px;color:#a8a29e">+${di.length-2}</div>`;
    html += "</div>";
  }
  html += "</div>";
  html += secTitle("🕐","Todos los programados");
  if(scheduled.length===0) html += emptyState("Sin items programados aún");
  else [...scheduled].sort((a,b)=>new Date(a.scheduled_at)-new Date(b.scheduled_at)).forEach(i => html+=itemCard(i,folders.find(f=>f.id===i.folder_id)));
  html += "</div>";
  return html;
}

// ── SEARCH
function renderSearch() {
  const q = document.getElementById("search-input")?.value || "";
  if (!q.trim()) return '<div style="padding:40px;text-align:center;color:#a8a29e"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#e5e7eb" stroke-width="2" style="display:block;margin:0 auto 10px"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><p style="font-size:14px">Escribe para buscar…</p></div>';
  const results = items.filter(i => i.title?.toLowerCase().includes(q.toLowerCase()) || (i.content||"").toLowerCase().includes(q.toLowerCase()));
  let html = `<div style="padding:16px"><p style="font-size:12px;color:#a8a29e;margin-bottom:12px">${results.length} resultado${results.length!==1?"s":""} para "<strong>${q}</strong>"</p>`;
  if (results.length === 0) html += emptyState("Sin resultados");
  else results.forEach(i => html += itemCard(i, folders.find(f=>f.id===i.folder_id)));
  html += "</div>";
  return html;
}

// ── ITEM CARD HTML
function itemCard(item, folder) {
  const progress = item.type==="list"&&item.list_items?.length>0 ? Math.round(item.list_items.filter(l=>l.checked).length/item.list_items.length*100) : null;
  let inner = "";
  if (item.type==="note"&&item.content) inner = `<p style="font-size:12px;color:#78716c;line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;margin-bottom:6px">${item.content.replace(/#+\s|[*_`>-]\s?/g,"").slice(0,110)}</p>`;
  if (item.type==="file"&&item.content) inner = `<p style="font-size:11px;color:#78716c;line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;margin-bottom:6px;font-family:monospace">${item.content.slice(0,100)}</p>`;
  if (item.type==="list"&&item.list_items?.length>0) {
    inner = item.list_items.slice(0,3).map(li=>`<div class="li-toggle" data-iid="${item.id}" data-lid="${li.id}" style="display:flex;align-items:center;gap:6px;padding:2px 0;cursor:pointer"><div style="width:14px;height:14px;border-radius:3px;border:${li.checked?"none":"1.5px solid #d6d3d1"};background:${li.checked?"#22c55e":"transparent"};display:flex;align-items:center;justify-content:center;flex-shrink:0">${li.checked?`<svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`:""}</div><span style="font-size:12px;color:${li.checked?"#a8a29e":"#57534e"};text-decoration:${li.checked?"line-through":"none"}">${li.content}</span></div>`).join("");
    if(item.list_items.length>3) inner+=`<span style="font-size:10px;color:#a8a29e">+${item.list_items.length-3} más</span>`;
    if(progress!==null) inner+=`<div style="margin-top:5px;height:3px;background:#f0ede9;border-radius:2px"><div style="height:100%;width:${progress}%;background:#22c55e;border-radius:2px"></div></div>`;
  }
  let meta = `<span style="font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;background:${STATUS_COLORS[item.status]}22;color:${STATUS_COLORS[item.status]}">${STATUS_LABELS[item.status]}</span>`;
  if(item.scheduled_at) meta+=`<span style="font-size:10px;color:#a8a29e">${fmtFull(item.scheduled_at)}</span>`;
  if(folder) meta+=`<span style="font-size:10px;color:#a8a29e;display:flex;align-items:center;gap:3px"><span style="display:inline-block;width:5px;height:5px;border-radius:50%;background:${folder.color}"></span>${folder.title}</span>`;
  return `<div class="icard item-open" data-iid="${item.id}" style="background:#fff;border-radius:12px;padding:14px 14px 12px;margin-bottom:9px;border:1px solid #ede9e3;position:relative;box-shadow:0 2px 6px rgba(0,0,0,.04)">
    <div style="position:absolute;top:0;left:0;bottom:0;width:4px;border-radius:12px 0 0 12px;background:${item.color||"#e5e7eb"}"></div>
    <div style="padding-left:8px">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:6px">
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
            <span style="font-weight:600;font-size:14px;color:#1c1917;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${item.title}</span>
          </div>
          ${inner}
        </div>
        <button class="item-del" data-iid="${item.id}" style="background:none;border:none;color:#d6d3d1;padding:2px;flex-shrink:0;cursor:pointer">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#d6d3d1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        </button>
      </div>
      <div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-top:2px">${meta}</div>
    </div>
  </div>`;
}

function secTitle(emoji, title) {
  return `<div style="display:flex;align-items:center;gap:6px;margin-bottom:9px;margin-top:2px"><span>${emoji}</span><span style="font-size:10px;font-weight:700;color:#a8a29e;text-transform:uppercase;letter-spacing:1px">${title}</span></div>`;
}
function emptyState(text) {
  return `<div style="text-align:center;padding:36px 20px;color:#a8a29e"><p style="font-size:13px">${text}</p></div>`;
}

// ── Attach events to cards
function attachCardEvents() {
  document.querySelectorAll(".item-open").forEach(el => {
    el.addEventListener("click", e => {
      if (e.target.closest(".item-del") || e.target.closest(".li-toggle")) return;
      const item = items.find(i => i.id === el.dataset.iid);
      if (item) openItemModal(item);
    });
  });
  document.querySelectorAll(".item-del").forEach(el => {
    el.addEventListener("click", e => {
      e.stopPropagation();
      showConfirm("¿Eliminar este item?", () => deleteItem(el.dataset.iid));
    });
  });
  document.querySelectorAll(".li-toggle").forEach(el => {
    el.addEventListener("click", e => {
      e.stopPropagation();
      toggleListItem(el.dataset.iid, el.dataset.lid);
    });
  });
  document.querySelectorAll(".filter-btn").forEach(el => {
    el.addEventListener("click", () => {
      document.querySelectorAll(".filter-btn").forEach(b => {
        const s = b.dataset.filter;
        b.style.background = "transparent";
        b.style.color = s==="all"?"#57534e":STATUS_COLORS[s];
        b.style.borderColor = s==="all"?"#d6d3d1":STATUS_COLORS[s];
      });
      const s = el.dataset.filter;
      el.style.background = s==="all"?"#1c1917":STATUS_COLORS[s];
      el.style.color = "#fff";
      el.dataset.filter && filterFolderItems(el.dataset.filter);
    });
  });
}

function filterFolderItems(filter) {
  const its = items.filter(i => i.folder_id === activeFolderId && (filter==="all"||i.status===filter));
  const container = document.getElementById("content").querySelector("[data-filter-container]");
  // Re-render folder with filter
  const el = document.getElementById("content");
  const prevFilter = filter;
  let html = "";
  if (its.length === 0) html = emptyState("Sin items con este filtro");
  else its.forEach(i => html += itemCard(i, null));
  // Replace items after filter buttons
  const filterDiv = el.querySelector("#folder-filters");
  if (filterDiv) {
    let next = filterDiv.nextSibling;
    while(next) { const n2 = next.nextSibling; next.remove(); next = n2; }
    filterDiv.insertAdjacentHTML("afterend", html);
    attachCardEvents();
  }
}

function attachCalEvents() {
  document.getElementById("cal-prev")?.addEventListener("click", () => {
    if (calMonth===0){calMonth=11;calYear--;}else calMonth--;
    renderContent();
  });
  document.getElementById("cal-next")?.addEventListener("click", () => {
    if (calMonth===11){calMonth=0;calYear++;}else calMonth++;
    renderContent();
  });
  document.querySelectorAll(".cal-d").forEach(el => {
    el.addEventListener("click", () => openItemModal(null, {scheduled_at:el.dataset.iso,status:"scheduled"}));
  });
  document.querySelectorAll(".cal-item").forEach(el => {
    el.addEventListener("click", e => {
      e.stopPropagation();
      const item = items.find(i=>i.id===el.dataset.iid);
      if(item) openItemModal(item);
    });
  });
}

// ── Folder list render
function renderFolderList() {
  const el = document.getElementById("folder-list");
  if (folders.length === 0) { el.innerHTML = '<div style="padding:6px 16px;color:#44403c;font-size:12px">Sin carpetas aún</div>'; return; }
  el.innerHTML = folders.map(f => `
    <div style="position:relative">
      <button class="slink folder-nav-btn ${activeFolderId===f.id?"active":""}" data-fid="${f.id}">
        <div style="width:7px;height:7px;border-radius:50%;background:${f.color};flex-shrink:0"></div>
        <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${f.title}</span>
        <span class="folder-menu-btn" data-fid="${f.id}" style="padding:2px;color:#57534e;font-size:16px;cursor:pointer">⋯</span>
      </button>
      <div class="folder-dropdown" id="fdrop-${f.id}" style="display:none;position:absolute;right:6px;top:100%;background:#292524;border-radius:8px;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:100;min-width:110px">
        <button class="folder-edit-btn" data-fid="${f.id}" style="width:100%;padding:9px 12px;background:none;border:none;color:#d6d3d1;font-size:12px;text-align:left;cursor:pointer">✏️ Editar</button>
        <button class="folder-del-btn" data-fid="${f.id}" style="width:100%;padding:9px 12px;background:none;border:none;color:#f87171;font-size:12px;text-align:left;cursor:pointer">🗑 Eliminar</button>
      </div>
    </div>
  `).join("");
  document.querySelectorAll(".folder-nav-btn").forEach(b => {
    b.onclick = e => { if(e.target.closest(".folder-menu-btn"))return; setView("folder",b.dataset.fid); };
  });
  document.querySelectorAll(".folder-menu-btn").forEach(b => {
    b.onclick = e => {
      e.stopPropagation();
      document.querySelectorAll(".folder-dropdown").forEach(d=>d.style.display="none");
      document.getElementById("fdrop-"+b.dataset.fid).style.display="block";
    };
  });
  document.querySelectorAll(".folder-edit-btn").forEach(b => {
    b.onclick = () => { closeDropdowns(); openFolderModal(folders.find(f=>f.id===b.dataset.fid)); };
  });
  document.querySelectorAll(".folder-del-btn").forEach(b => {
    b.onclick = () => { closeDropdowns(); showConfirm(`¿Eliminar carpeta "${folders.find(f=>f.id===b.dataset.fid)?.title}"?`, ()=>deleteFolder(b.dataset.fid)); };
  });
  document.addEventListener("click", closeDropdowns, {once:true});
}
function closeDropdowns(){document.querySelectorAll(".folder-dropdown").forEach(d=>d.style.display="none");}

// ── ITEM MODAL
function openItemModal(item, prefill={}) {
  editingItem = item;
  currentListItems = item?.list_items ? [...item.list_items] : [];
  document.getElementById("modal-title").textContent = item ? "Editar" : "Nueva nota";
  document.getElementById("item-title-input").value = item?.title || "";
  document.getElementById("note-content").value = item?.content || "";
  document.getElementById("file-content").value = item?.content || "";
  document.getElementById("item-status").value = item?.status || prefill.status || "draft";
  document.getElementById("item-scheduled").value = (item?.scheduled_at || prefill.scheduled_at || "").slice(0,16);
  // Folder select
  const sel = document.getElementById("item-folder");
  sel.innerHTML = '<option value="">Sin carpeta</option>' + folders.map(f=>`<option value="${f.id}"${(item?.folder_id||null)===f.id?" selected":""}>${f.title}</option>`).join("");
  if (prefill.folder_id) sel.value = prefill.folder_id;
  // Type
  const type = item?.type || "note";
  setItemType(type);
  // Color
  currentItemColor = item?.color || "#f59e0b";
  renderColorPicker("color-picker", currentItemColor, c=>currentItemColor=c);
  // List items
  renderListItems();
  document.getElementById("item-modal").style.display = "flex";
}
document.getElementById("btn-close-item").onclick = () => document.getElementById("item-modal").style.display = "none";
document.getElementById("item-modal").onclick = e => { if(e.target===document.getElementById("item-modal")) document.getElementById("item-modal").style.display="none"; };

document.querySelectorAll(".type-btn").forEach(b => {
  b.onclick = () => setItemType(b.dataset.type);
});
function setItemType(type) {
  document.querySelectorAll(".type-btn").forEach(b => {
    const active = b.dataset.type === type;
    b.style.background = active?"#1c1917":"transparent";
    b.style.color = active?"#fff":"#78716c";
    b.style.borderColor = active?"#1c1917":"#e7e5e4";
  });
  document.getElementById("note-editor").style.display = type==="note"?"block":"none";
  document.getElementById("file-editor").style.display = type==="file"?"block":"none";
  document.getElementById("list-editor").style.display = type==="list"?"block":"none";
}

// Note preview
document.getElementById("btn-edit-mode").onclick = () => {
  document.getElementById("note-content").style.display="block";
  document.getElementById("note-preview").style.display="none";
  document.getElementById("btn-edit-mode").style.background="#1c1917";document.getElementById("btn-edit-mode").style.color="#fff";document.getElementById("btn-edit-mode").style.borderColor="#1c1917";
  document.getElementById("btn-preview-mode").style.background="transparent";document.getElementById("btn-preview-mode").style.color="#78716c";document.getElementById("btn-preview-mode").style.borderColor="#e7e5e4";
};
document.getElementById("btn-preview-mode").onclick = () => {
  const content = document.getElementById("note-content").value;
  document.getElementById("note-preview").innerHTML = renderMd(content);
  document.getElementById("note-content").style.display="none";
  document.getElementById("note-preview").style.display="block";
  document.getElementById("btn-preview-mode").style.background="#1c1917";document.getElementById("btn-preview-mode").style.color="#fff";document.getElementById("btn-preview-mode").style.borderColor="#1c1917";
  document.getElementById("btn-edit-mode").style.background="transparent";document.getElementById("btn-edit-mode").style.color="#78716c";document.getElementById("btn-edit-mode").style.borderColor="#e7e5e4";
};

function renderMd(t) {
  return t.replace(/^### (.+)$/gm,'<h3 style="font-size:13px;font-weight:700;margin:10px 0 5px">$1</h3>').replace(/^## (.+)$/gm,'<h2 style="font-size:16px;font-weight:700;margin:12px 0 7px">$1</h2>').replace(/^# (.+)$/gm,'<h1 style="font-size:19px;font-weight:700;margin:14px 0 8px">$1</h1>').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>').replace(/`(.+?)`/g,'<code style="background:#f0ede9;padding:1px 5px;border-radius:4px;font-size:11px;font-family:monospace">$1</code>').replace(/^> (.+)$/gm,'<blockquote style="border-left:3px solid #f59e0b;padding-left:10px;color:#78716c;margin:7px 0">$1</blockquote>').replace(/^- (.+)$/gm,'<li style="margin:3px 0;padding-left:4px">$1</li>').replace(/\n/g,'<br>');
}

// List items
function renderListItems() {
  const el = document.getElementById("list-items-container");
  el.innerHTML = currentListItems.map(li=>`
    <div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #f5f5f4">
      <button class="li-check-btn" data-lid="${li.id}" style="background:none;border:none;cursor:pointer;flex-shrink:0;display:flex;align-items:center">
        <div style="width:18px;height:18px;border-radius:4px;border:${li.checked?"none":"1.5px solid #d6d3d1"};background:${li.checked?"#22c55e":"transparent"};display:flex;align-items:center;justify-content:center">
          ${li.checked?`<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`:""}
        </div>
      </button>
      <span style="flex:1;font-size:14px;color:${li.checked?"#a8a29e":"#292524"};text-decoration:${li.checked?"line-through":"none"}">${li.content}</span>
      <button class="li-del-btn" data-lid="${li.id}" style="background:none;border:none;cursor:pointer">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#d6d3d1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>`).join("");
  document.querySelectorAll(".li-check-btn").forEach(b=>b.onclick=()=>{
    currentListItems=currentListItems.map(l=>l.id===b.dataset.lid?{...l,checked:!l.checked}:l);renderListItems();
  });
  document.querySelectorAll(".li-del-btn").forEach(b=>b.onclick=()=>{
    currentListItems=currentListItems.filter(l=>l.id!==b.dataset.lid);renderListItems();
  });
}
document.getElementById("li-input").onkeydown = e => { if(e.key==="Enter") addListItem(); };
document.getElementById("btn-add-li").onclick = addListItem;
function addListItem() {
  const inp = document.getElementById("li-input");
  if(!inp.value.trim()) return;
  currentListItems.push({id:uid(),content:inp.value.trim(),checked:false,position:currentListItems.length});
  inp.value="";
  renderListItems();
}

document.getElementById("btn-save-item").onclick = saveItem;
async function saveItem() {
  const title = document.getElementById("item-title-input").value.trim();
  if(!title) return;
  const activeType = document.querySelector(".type-btn[style*='#1c1917']")?.dataset.type || "note";
  const content = activeType==="list"?"" : activeType==="note"?document.getElementById("note-content").value : document.getElementById("file-content").value;
  const now2 = new Date().toISOString();
  const data = {
    title, type:activeType, content,
    status:document.getElementById("item-status").value,
    folder_id:document.getElementById("item-folder").value||null,
    scheduled_at:document.getElementById("item-scheduled").value||null,
    color:currentItemColor,
    list_items:currentListItems,
    user_id:currentUser.uid,
    updated_at:now2,
    created_at:editingItem?.created_at||now2,
  };
  const id = editingItem?.id || uid();
  await db.collection("users").doc(currentUser.uid).collection("items").doc(id).set({...data,id});
  document.getElementById("item-modal").style.display="none";
}

// ── FOLDER MODAL
document.getElementById("btn-new-folder").onclick = () => openFolderModal(null);
function openFolderModal(folder) {
  editingFolder = folder;
  document.getElementById("folder-modal-title").textContent = folder?"Editar carpeta":"Nueva carpeta";
  document.getElementById("btn-save-folder").textContent = folder?"Guardar cambios":"Crear carpeta";
  document.getElementById("folder-title-input").value = folder?.title||"";
  document.getElementById("folder-desc-input").value = folder?.description||"";
  currentFolderColor = folder?.color||"#f59e0b";
  renderColorPicker("folder-color-picker", currentFolderColor, c=>currentFolderColor=c);
  document.getElementById("folder-modal").style.display="flex";
}
document.getElementById("btn-close-folder").onclick=()=>document.getElementById("folder-modal").style.display="none";
document.getElementById("folder-modal").onclick=e=>{if(e.target===document.getElementById("folder-modal"))document.getElementById("folder-modal").style.display="none";};
document.getElementById("btn-save-folder").onclick=async()=>{
  const title=document.getElementById("folder-title-input").value.trim();
  if(!title)return;
  const id=editingFolder?.id||uid();
  const now2=new Date().toISOString();
  await db.collection("users").doc(currentUser.uid).collection("folders").doc(id).set({id,title,description:document.getElementById("folder-desc-input").value,color:currentFolderColor,user_id:currentUser.uid,created_at:editingFolder?.created_at||now2,updated_at:now2});
  document.getElementById("folder-modal").style.display="none";
};

// ── DELETE
async function deleteFolder(id) {
  await db.collection("users").doc(currentUser.uid).collection("folders").doc(id).delete();
  const batch = db.batch();
  items.filter(i=>i.folder_id===id).forEach(i=>{
    batch.update(db.collection("users").doc(currentUser.uid).collection("items").doc(i.id),{folder_id:null});
  });
  await batch.commit();
  if(activeFolderId===id)setView("home");
}
async function deleteItem(id) {
  await db.collection("users").doc(currentUser.uid).collection("items").doc(id).delete();
}
async function toggleListItem(itemId, liId) {
  const item=items.find(i=>i.id===itemId);
  if(!item)return;
  const updated={...item,list_items:item.list_items.map(l=>l.id===liId?{...l,checked:!l.checked}:l),updated_at:new Date().toISOString()};
  await db.collection("users").doc(currentUser.uid).collection("items").doc(itemId).set(updated);
}

// ── Color picker
function renderColorPicker(containerId, selected, onChange) {
  const el = document.getElementById(containerId);
  el.innerHTML = COLORS.map(c=>`<button class="cp-btn" data-color="${c}" style="width:22px;height:22px;border-radius:50%;background:${c};border:${selected===c?"2.5px solid #1c1917":"2px solid transparent"};padding:0;cursor:pointer;display:flex;align-items:center;justify-content:center">${selected===c?`<svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`:""}</button>`).join("");
  el.querySelectorAll(".cp-btn").forEach(b=>b.onclick=()=>{onChange(b.dataset.color);renderColorPicker(containerId,b.dataset.color,onChange);});
}

// ── Confirm dialog
function showConfirm(msg, cb) {
  document.getElementById("confirm-msg").textContent=msg;
  confirmCallback=cb;
  document.getElementById("confirm-modal").style.display="flex";
}
document.getElementById("btn-confirm-ok").onclick=()=>{if(confirmCallback)confirmCallback();document.getElementById("confirm-modal").style.display="none";};
document.getElementById("btn-confirm-cancel").onclick=()=>document.getElementById("confirm-modal").style.display="none";

// ── FAB
document.getElementById("fab").onclick=()=>openItemModal(null,{folder_id:activeFolderId});
</script>
</body>
</html>
